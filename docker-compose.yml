services:
  db:
    image: postgis/postgis:16-3.4
    container_name: walk-db
    environment:
      POSTGRES_DB: ${DB_NAME:-walk}
      POSTGRES_USER: ${DB_USERNAME:-walk}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-walk}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - walk-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-walk} -d ${DB_NAME:-walk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: walk-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-walk}
      DB_USERNAME: ${DB_USERNAME:-walk}
      DB_PASSWORD: ${DB_PASSWORD:-walk}
      SERVER_PORT: 8080
      # JWT: в проде задать свой секрет (≥32 байт) через .env. Дефолт — только для
      # локалки (пустую строку не передаём: пустой секрет уронил бы старт)
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-super-secret-key-32bytes-minimum!!}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-720}
      # Источник мест: osm (Overpass, бесплатно, но публичный инстанс медленный —
      # импорт зоны до 50с) или geoapify (через прокси ~1с на категорию, параллельно)
      PLACES_SOURCE: ${PLACES_SOURCE:-osm}
      # Контейнер резолвит воркер (*.workers.dev) часто только в IPv6, а у Docker-bridge
      # нет IPv6-выхода → Connect timed out. Принуждаем JVM к IPv4
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY:-}
      # Cloudflare Worker-прокси для Geoapify (запросы из РФ без VPN). Если не задано —
      # ходим напрямую в api.geoapify.com
      GEOAPIFY_BASE_URL: ${GEOAPIFY_BASE_URL:-https://api.geoapify.com}
      GEOAPIFY_PROXY_TOKEN: ${GEOAPIFY_PROXY_TOKEN:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      # Логи приложения доступны на хосте в ./logs (файл перезаписывается при старте)
      - ./logs:/app/logs

volumes:
  walk-pgdata:
