spring:
  application:
    name: walk-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walk}
    username: ${DB_USERNAME:walk}
    password: ${DB_PASSWORD:walk}

  jpa:
    hibernate:
      ddl-auto: validate   # схемой владеет Flyway, Hibernate её не меняет
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

walk:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  geoapify:
    api-key: ${GEOAPIFY_API_KEY:}
    base-url: https://api.geoapify.com

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
