spring:
  application:
    name: walk-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walk}
    username: ${DB_USERNAME:walk}
    password: ${DB_PASSWORD:walk}

  jpa:
    hibernate:
      ddl-auto: validate   # схемой владеет Flyway, Hibernate её не меняет
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

walk:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  places:
    # Источник мест: osm (Overpass, бесплатно) или geoapify
    source: ${PLACES_SOURCE:osm}
  overpass:
    url: ${OVERPASS_URL:https://overpass-api.de/api/interpreter}
    timeout-seconds: ${OVERPASS_TIMEOUT_SECONDS:60}
  geoapify:
    api-key: ${GEOAPIFY_API_KEY:}
    # base-url можно указать на Cloudflare Worker-прокси (запросы из РФ без VPN);
    # тогда задаётся proxy-token, а ключ Geoapify держит сам воркер
    base-url: ${GEOAPIFY_BASE_URL:https://api.geoapify.com}
    proxy-token: ${GEOAPIFY_PROXY_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
